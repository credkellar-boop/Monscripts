name: MonScripts Multi-Platform Build Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-engine:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Audio Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y portaudio19-dev python3-pyaudio

    - name: Install Python Package Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Core Test Sandbox
      run: |
        python main.py

  build-distribution:
    needs: test-engine
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Verify Universal Cloud Image Compilation
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64,linux/arm64
        push: false
        tags: monscripts-core:latest

    - name: Set up Python for Binary Compilation
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Audio Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y portaudio19-dev python3-pyaudio

    - name: Install Compiler Utilities
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Compile Standalone Hardware Executable
      run: |
        pyinstaller --onefile --hidden-import=cryptography --hidden-import=speech_recognition main.py

    - name: Archive Production Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: monscripts-standalone-binary
        path: dist/
